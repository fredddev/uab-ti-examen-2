{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>Listado de Categorías</h2>
    
    <a href="{{ url_for('categories.create_category_form_html') }}" class="btn btn-success mb-3">
        Crear Nueva Categoría
    </a>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for category in categories %}
            <tr>
                <td>{{ category.id }}</td>
                <td>{{ category.name }}</td>
                <td>{{ category.description }}</td>
                <td>
                    <a href="{{ url_for('categories.edit_category', category_id=category.id) }}" class="btn btn-primary btn-sm">Editar</a>
                    <a href="#" class="btn btn-danger btn-sm">Eliminar</a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center">No hay categorías</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
