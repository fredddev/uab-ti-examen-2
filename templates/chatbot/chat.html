<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chatbot – Groq AI</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .chat-container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,.12);
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            height: 85vh;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #6c63ff, #48b1e6);
            color: #fff;
            padding: 1.1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: .75rem;
        }
        .chat-header .avatar {
            width: 42px; height: 42px;
            border-radius: 50%;
            background: rgba(255,255,255,.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
        }
        .chat-header h1 { font-size: 1.1rem; font-weight: 600; }
        .chat-header p  { font-size: .78rem; opacity: .85; }

        /* Messages area */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: .75rem;
        }

        .message {
            max-width: 78%;
            padding: .65rem 1rem;
            border-radius: 14px;
            line-height: 1.5;
            font-size: .95rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #6c63ff;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.bot {
            align-self: flex-start;
            background: #f0f2f5;
            color: #1a1a2e;
            border-bottom-left-radius: 4px;
        }
        .message.error {
            align-self: center;
            background: #ffe5e5;
            color: #c0392b;
            font-size: .85rem;
            max-width: 90%;
        }
        .message.typing {
            align-self: flex-start;
            background: #f0f2f5;
            color: #888;
            font-style: italic;
            font-size: .88rem;
        }

        /* Input area */
        .chat-input-area {
            border-top: 1px solid #e5e7eb;
            padding: 1rem 1.25rem;
            display: flex;
            gap: .75rem;
        }
        #messageInput {
            flex: 1;
            border: 1.5px solid #d1d5db;
            border-radius: 24px;
            padding: .65rem 1.1rem;
            font-size: .95rem;
            outline: none;
            resize: none;
            height: 48px;
            transition: border-color .2s;
        }
        #messageInput:focus { border-color: #6c63ff; }

        #sendBtn {
            background: #6c63ff;
            color: #fff;
            border: none;
            border-radius: 24px;
            padding: 0 1.4rem;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s, transform .1s;
            white-space: nowrap;
        }
        #sendBtn:hover  { background: #5a52e0; }
        #sendBtn:active { transform: scale(.96); }
        #sendBtn:disabled { background: #b5b1ef; cursor: not-allowed; }

        /* Scrollbar */
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div class="avatar">🤖</div>
        <div>
            <h1>Asistente IA</h1>
            <p>Con tecnología Groq · LLaMA 3.3 70B</p>
        </div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            ¡Hola! 👋 Soy tu asistente virtual. Estoy aquí para ayudarte con cualquier pregunta.
            ¿En qué puedo ayudarte hoy?
        </div>
    </div>

    <div class="chat-input-area">
        <textarea
            id="messageInput"
            placeholder="Escribe tu mensaje..."
            rows="1"
            autocomplete="off"
        ></textarea>
        <button id="sendBtn">Enviar</button>
    </div>
</div>

<script>
    const messagesEl  = document.getElementById('chatMessages');
    const inputEl     = document.getElementById('messageInput');
    const sendBtn     = document.getElementById('sendBtn');

    // Historial de conversación (stateless en DB pero mantenido en memoria del cliente)
    const history = [];

    function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function appendMessage(text, role) {
        const div = document.createElement('div');
        div.classList.add('message', role);
        div.textContent = text;
        messagesEl.appendChild(div);
        scrollToBottom();
        return div;
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        // Mostrar mensaje del usuario
        appendMessage(text, 'user');
        history.push({ role: 'user', content: text });

        inputEl.value = '';
        inputEl.style.height = '48px';
        sendBtn.disabled = true;

        // Indicador de escritura
        const typingDiv = appendMessage('Escribiendo…', 'typing');

        try {
            const response = await fetch('/chatbot/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, history: history.slice(0, -1) })
            });

            const data = await response.json();
            typingDiv.remove();

            if (!response.ok || data.error) {
                appendMessage('❌ ' + (data.error || 'Error desconocido.'), 'error');
            } else {
                appendMessage(data.reply, 'bot');
                history.push({ role: 'assistant', content: data.reply });
            }
        } catch (err) {
            typingDiv.remove();
            appendMessage('❌ No se pudo conectar con el servidor.', 'error');
        }

        sendBtn.disabled = false;
        inputEl.focus();
    }

    // Enviar con Enter (Shift+Enter = salto de línea)
    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
        inputEl.style.height = '48px';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    sendBtn.addEventListener('click', sendMessage);
</script>

</body>
</html>
